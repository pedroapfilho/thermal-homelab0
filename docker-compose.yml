services:
  thermal-homelab0:
    build: .
    container_name: thermal-homelab0
    # Override the Dockerfile CMD to strip SSL — Traefik handles TLS termination.
    command: uv run uvicorn main:app --host 0.0.0.0 --port 8000
    # USB passthrough requires privileged + device mount.
    # This service must be deployed with `docker compose up`, NOT `docker stack deploy`.
    # Docker Swarm does not support the `devices` key and will silently drop it.
    privileged: true
    devices:
      - "/dev/bus/usb:/dev/bus/usb"
    user: root
    env_file:
      - .env
    volumes:
      - ./logs:/app/logs
    ports:
      - "8000:8000"
    networks:
      - traefik_compose
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.thermal-homelab0.rule=Host(`thermal.homelab0.local`)"
      - "traefik.http.routers.thermal-homelab0.entrypoints=websecure"
      - "traefik.http.services.thermal-homelab0.loadbalancer.server.port=8000"
      - "traefik.docker.network=traefik_compose"

networks:
  traefik_compose:
    name: traefik_compose
    external: true
