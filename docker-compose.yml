services:
  app:
    build: .
    container_name: ${APP_NAME:-thermal-homelab0}
    # Override the Dockerfile CMD to strip SSL — Traefik handles TLS termination.
    command: uv run uvicorn main:app --host 0.0.0.0 --port ${APP_PORT:-8000}
    # USB passthrough requires privileged + device mount.
    # This service must be deployed with `docker compose up`, NOT `docker stack deploy`.
    # Docker Swarm does not support the `devices` key and will silently drop it.
    privileged: true
    devices:
      - "/dev/bus/usb:/dev/bus/usb"
    user: root
    env_file:
      - .env
    volumes:
      - ./logs:/app/logs
    ports:
      - "${APP_PORT:-8000}:${APP_PORT:-8000}"
    networks:
      - traefik_net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.${APP_NAME:-thermal-homelab0}.rule=Host(`${TRAEFIK_HOST:-localhost}`)"
      - "traefik.http.routers.${APP_NAME:-thermal-homelab0}.entrypoints=${TRAEFIK_ENTRYPOINT:-websecure}"
      - "traefik.http.services.${APP_NAME:-thermal-homelab0}.loadbalancer.server.port=${APP_PORT:-8000}"
      - "traefik.docker.network=${TRAEFIK_NETWORK:-traefik_compose}"
    deploy:
      restart_policy:
        condition: any

networks:
  traefik_net:
    name: ${TRAEFIK_NETWORK:-traefik_compose}
    external: true
